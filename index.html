<!DOCTYPE html>

<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<meta name="color-scheme" content="dark">
<title>Trading Journal</title>
<style>
* { margin:0; padding:0; box-sizing:border-box; -webkit-appearance:none; }
html, body { background-color:#0a0a0f !important; color:#e0e0f0 !important; font-family:-apple-system,sans-serif; min-height:100vh; -webkit-text-size-adjust:100%; }
body { padding:16px; background:#0a0a0f !important; }
.hdr { display:flex; justify-content:space-between; align-items:center; margin-bottom:20px; padding-bottom:14px; border-bottom:1px solid #2a2a3a; }
.hdr h1 { font-family:monospace; font-size:18px; color:#00ff88; letter-spacing:2px; }
.hdr p { font-size:11px; color:#6060a0; margin-top:3px; }
.btn-add { background:#00ff88 !important; color:#000 !important; border:none; padding:10px 16px; border-radius:8px; font-family:monospace; font-size:12px; font-weight:700; cursor:pointer; }
.stats { display:grid; grid-template-columns:repeat(2,1fr); gap:10px; margin-bottom:14px; }
.stat { background:#12121a !important; border:1px solid #2a2a3a; border-radius:10px; padding:14px; }
.stat-lbl { font-size:10px; color:#6060a0; text-transform:uppercase; letter-spacing:1px; margin-bottom:4px; }
.stat-val { font-family:monospace; font-size:22px; font-weight:700; }
.cg { color:#00ff88 !important; } .cr { color:#ff3366 !important; } .cy { color:#ffd700 !important; } .cw { color:#e0e0f0 !important; }
.eq-bar { display:flex; align-items:center; gap:8px; margin-bottom:14px; }
.eq-lbl { font-size:10px; color:#6060a0; white-space:nowrap; }
.eq-track { flex:1; height:5px; background:#1a1a26; border-radius:3px; overflow:hidden; }
.eq-fill { height:100%; background:linear-gradient(90deg,#00ff88,#00aaff); border-radius:3px; }
.eq-pct { font-family:monospace; font-size:11px; color:#00ff88; }
.filters { display:flex; gap:6px; margin-bottom:14px; flex-wrap:wrap; }
.ftab { padding:5px 12px; border-radius:20px; border:1px solid #2a2a3a; background:#0a0a0f !important; color:#6060a0 !important; font-size:11px; cursor:pointer; }
.ftab.on { border-color:#00ff88; color:#00ff88 !important; background:rgba(0,255,136,0.08) !important; }
.sec { display:flex; justify-content:space-between; font-family:monospace; font-size:11px; color:#6060a0; text-transform:uppercase; letter-spacing:2px; margin-bottom:10px; }
.card { background:#12121a !important; border:1px solid #2a2a3a; border-radius:10px; padding:14px; margin-bottom:10px; }
.card.win { border-left:3px solid #00ff88; } .card.loss { border-left:3px solid #ff3366; } .card.be { border-left:3px solid #ffd700; }
.card-top { display:flex; justify-content:space-between; align-items:center; margin-bottom:10px; flex-wrap:wrap; gap:6px; }
.dtag { font-family:monospace; font-size:11px; font-weight:700; padding:3px 8px; border-radius:4px; }
.dtag.buy { background:rgba(0,255,136,0.15); color:#00ff88 !important; }
.dtag.sell { background:rgba(255,51,102,0.15); color:#ff3366 !important; }
.sym { font-family:monospace; font-size:15px; font-weight:700; color:#e0e0f0; margin:0 6px; }
.dt { font-size:11px; color:#6060a0; }
.rtag { font-family:monospace; font-size:12px; font-weight:700; padding:3px 10px; border-radius:6px; }
.rtag.win { background:rgba(0,255,136,0.15); color:#00ff88 !important; }
.rtag.loss { background:rgba(255,51,102,0.15); color:#ff3366 !important; }
.rtag.be { background:rgba(255,215,0,0.15); color:#ffd700 !important; }
.cgrid { display:grid; grid-template-columns:repeat(4,1fr); gap:8px; margin-bottom:8px; }
.fl { font-size:10px; color:#6060a0; text-transform:uppercase; letter-spacing:1px; margin-bottom:2px; }
.fv { font-family:monospace; font-size:13px; color:#e0e0f0; }
.rsn { background:#1a1a26 !important; border-radius:6px; padding:7px 10px; font-size:12px; color:#9090b0; margin-bottom:6px; line-height:1.5; }
.rsn strong { color:#e0e0f0; }
.cact { display:flex; justify-content:flex-end; gap:6px; }
.bsm { background:#1a1a26 !important; border:1px solid #2a2a3a; color:#9090b0 !important; padding:4px 10px; border-radius:6px; font-size:11px; cursor:pointer; }
.bdel { background:#1a1a26 !important; border:1px solid #2a2a3a; color:#ff3366 !important; padding:4px 10px; border-radius:6px; font-size:11px; cursor:pointer; }
.empty { text-align:center; padding:50px 20px; color:#6060a0; }
.empty .ico { font-size:36px; margin-bottom:10px; }
.ov { display:none; position:fixed; inset:0; background:rgba(0,0,0,0.85); z-index:100; overflow-y:auto; padding:20px; }
.ov.show { display:block; }
.modal { background:#12121a !important; border:1px solid #2a2a3a; border-radius:14px; width:100%; max-width:460px; padding:20px; margin:0 auto; }
.mhdr { display:flex; justify-content:space-between; align-items:center; margin-bottom:18px; }
.mtitle { font-family:monospace; font-size:15px; color:#00ff88; }
.xbtn { background:none; border:none; color:#6060a0; font-size:22px; cursor:pointer; }
.fr { margin-bottom:12px; }
.lbl { display:block; font-size:10px; color:#6060a0; text-transform:uppercase; letter-spacing:1px; margin-bottom:5px; }
input,select,textarea { width:100%; background:#1a1a26 !important; border:1px solid #2a2a3a !important; border-radius:7px; padding:10px 12px; color:#e0e0f0 !important; font-size:14px; outline:none; -webkit-appearance:none; appearance:none; box-sizing:border-box; font-family:-apple-system,sans-serif; }
input:focus,select:focus,textarea:focus { border-color:#00ff88 !important; }
textarea { resize:vertical; min-height:65px; }
.g2 { display:grid; grid-template-columns:1fr 1fr; gap:10px; }
.dbts { display:flex; gap:8px; }
.dbt { flex:1; padding:10px; border-radius:7px; border:1px solid #2a2a3a; background:#1a1a26 !important; color:#6060a0 !important; font-family:monospace; font-size:13px; font-weight:700; cursor:pointer; text-align:center; }
.dbt.buy.on { border-color:#00ff88 !important; background:rgba(0,255,136,0.15) !important; color:#00ff88 !important; }
.dbt.sell.on { border-color:#ff3366 !important; background:rgba(255,51,102,0.15) !important; color:#ff3366 !important; }
.rrbox { background:#1a1a26 !important; border:1px solid #2a2a3a; border-radius:8px; padding:12px; margin:12px 0; }
.rrrow { display:flex; justify-content:space-between; align-items:center; margin-bottom:6px; }
.rrlbl { font-size:11px; color:#6060a0; text-transform:uppercase; }
.rrval { font-family:monospace; font-size:14px; font-weight:700; }
.rbts { display:flex; gap:8px; }
.rbt { flex:1; padding:10px; border-radius:7px; border:1px solid #2a2a3a; background:#1a1a26 !important; color:#6060a0 !important; font-family:monospace; font-size:11px; font-weight:700; cursor:pointer; text-align:center; }
.rbt.win.on { border-color:#00ff88 !important; background:rgba(0,255,136,0.15) !important; color:#00ff88 !important; }
.rbt.loss.on { border-color:#ff3366 !important; background:rgba(255,51,102,0.15) !important; color:#ff3366 !important; }
.rbt.be.on { border-color:#ffd700 !important; background:rgba(255,215,0,0.15) !important; color:#ffd700 !important; }
.bsave { width:100%; padding:14px; background:#00ff88 !important; color:#000 !important; border:none; border-radius:10px; font-family:monospace; font-size:14px; font-weight:700; cursor:pointer; margin-top:16px; }
</style>
</head>
<body>

<div class="hdr">
  <div><h1>TRADING JOURNAL</h1><p>บันทึกเทรด · คำนวณ RR อัตโนมัติ</p></div>
  <button class="btn-add" onclick="openModal()">+ บันทึกเทรด</button>
</div>

<div class="stats">
  <div class="stat"><div class="stat-lbl">Win Rate</div><div class="stat-val cg" id="sWR">0%</div></div>
  <div class="stat"><div class="stat-lbl">Total Trades</div><div class="stat-val cw" id="sT">0</div></div>
  <div class="stat"><div class="stat-lbl">Avg R:R</div><div class="stat-val cy" id="sRR">0.00</div></div>
  <div class="stat"><div class="stat-lbl">Profit Factor</div><div class="stat-val cw" id="sPF">0.00</div></div>
</div>

<div class="eq-bar">
  <span class="eq-lbl">Win Rate</span>
  <div class="eq-track"><div class="eq-fill" id="eqF" style="width:0%"></div></div>
  <span class="eq-pct" id="eqP">0%</span>
</div>

<div class="filters">
  <button class="ftab on" onclick="sf('all',this)">ทั้งหมด</button>
  <button class="ftab" onclick="sf('win',this)">✅ Win</button>
  <button class="ftab" onclick="sf('loss',this)">❌ Loss</button>
  <button class="ftab" onclick="sf('be',this)">⚪ BE</button>
  <button class="ftab" onclick="sf('buy',this)">🟢 Buy</button>
  <button class="ftab" onclick="sf('sell',this)">🔴 Sell</button>
</div>

<div class="sec"><span>ประวัติเทรด</span><span id="tC">0 รายการ</span></div>
<div id="tList"><div class="empty"><div class="ico">📋</div><p>ยังไม่มีรายการ<br>กด "+ บันทึกเทรด" เพื่อเริ่ม</p></div></div>

<div class="ov" id="ov" onclick="bgC(event)">
  <div class="modal">
    <div class="mhdr"><span class="mtitle" id="mT">บันทึกเทรด</span><button class="xbtn" onclick="closeModal()">✕</button></div>
    <div class="fr"><label class="lbl">Symbol</label><input type="text" id="fS" value="XAUUSD"></div>
    <div class="fr"><label class="lbl">ทิศทาง</label>
      <div class="dbts">
        <button class="dbt buy on" id="dB" onclick="sd('buy')">▲ BUY</button>
        <button class="dbt sell" id="dSe" onclick="sd('sell')">▼ SELL</button>
      </div>
    </div>
    <div class="fr"><label class="lbl">ประเภทออเดอร์</label>
      <select id="fTy"><option value="market">Market</option><option value="limit">Limit</option><option value="stop">Stop</option></select>
    </div>
    <div class="g2">
      <div class="fr"><label class="lbl">Entry Price</label><input type="number" id="fE" placeholder="0.00" step="0.01" oninput="cRR()"></div>
      <div class="fr"><label class="lbl">วันที่เทรด</label><input type="date" id="fD"></div>
    </div>
    <div class="g2">
      <div class="fr"><label class="lbl">Stop Loss (SL)</label><input type="number" id="fSL" placeholder="0.00" step="0.01" oninput="cRR()"></div>
      <div class="fr"><label class="lbl">Take Profit (TP)</label><input type="number" id="fTP" placeholder="0.00" step="0.01" oninput="cRR()"></div>
    </div>
    <div class="rrbox">
      <div class="rrrow"><span class="rrlbl">Risk (SL)</span><span class="rrval cr" id="rRisk">-</span></div>
      <div class="rrrow"><span class="rrlbl">Reward (TP)</span><span class="rrval cg" id="rRew">-</span></div>
      <div class="rrrow" style="border-top:1px solid #2a2a3a;padding-top:8px;margin-top:4px;margin-bottom:0">
        <span class="rrlbl">R:R Ratio</span><span class="rrval cy" id="rRatio" style="font-size:18px">-</span>
      </div>
    </div>
    <div class="fr"><label class="lbl">ผลลัพธ์</label>
      <div class="rbts">
        <button class="rbt win" id="rW" onclick="sr('win')">✅ WIN</button>
        <button class="rbt loss" id="rL" onclick="sr('loss')">❌ LOSS</button>
        <button class="rbt be" id="rB" onclick="sr('be')">⚪ BE</button>
      </div>
    </div>
    <div class="fr"><label class="lbl">เหตุผลที่เข้า</label><textarea id="fRI" placeholder="เช่น OB 4H + MSS 15m + Volume สูง..."></textarea></div>
    <div class="fr"><label class="lbl">เหตุผลที่แพ้/ชนะ</label><textarea id="fRO" placeholder="เช่น โดน Liquidity Grab, ไม่รอ MSS..."></textarea></div>
    <button class="bsave" onclick="saveTrade()">💾 บันทึก</button>
  </div>
</div>

<script>
const KEY='tj_v3'
let trades=[];try{trades=JSON.parse(localStorage.getItem(KEY)||'[]')}catch{}
let dir='buy',res='',filt='all',eid=null
document.getElementById('fD').value=new Date().toISOString().split('T')[0]
function sv(){try{localStorage.setItem(KEY,JSON.stringify(trades))}catch{}}
function openModal(id){
  eid=id||null
  if(id){
    const t=trades.find(x=>x.id===id)
    document.getElementById('mT').textContent='แก้ไขเทรด'
    document.getElementById('fS').value=t.symbol
    document.getElementById('fE').value=t.entry
    document.getElementById('fSL').value=t.sl
    document.getElementById('fTP').value=t.tp
    document.getElementById('fD').value=t.date
    document.getElementById('fTy').value=t.type
    document.getElementById('fRI').value=t.rin
    document.getElementById('fRO').value=t.rout
    sd(t.dir);sr(t.result);cRR()
  }else{
    document.getElementById('mT').textContent='บันทึกเทรด'
    rf()
  }
  document.getElementById('ov').classList.add('show')
}
function closeModal(){document.getElementById('ov').classList.remove('show');rf()}
function bgC(e){if(e.target===document.getElementById('ov'))closeModal()}
function rf(){
  document.getElementById('fS').value='XAUUSD'
  ;['fE','fSL','fTP'].forEach(x=>document.getElementById(x).value='')
  document.getElementById('fD').value=new Date().toISOString().split('T')[0]
  document.getElementById('fTy').value='market'
  ;['fRI','fRO'].forEach(x=>document.getElementById(x).value='')
  ;['rRisk','rRew','rRatio'].forEach(x=>document.getElementById(x).textContent='-')
  sd('buy');res=''
  ;['rW','rL','rB'].forEach(x=>document.getElementById(x).classList.remove('on'))
  eid=null
}
function sd(d){
  dir=d
  document.getElementById('dB').className='dbt buy'+(d==='buy'?' on':'')
  document.getElementById('dSe').className='dbt sell'+(d==='sell'?' on':'')
}
function sr(r){
  res=r
  ;['rW','rL','rB'].forEach(x=>document.getElementById(x).classList.remove('on'))
  const m={win:'rW',loss:'rL',be:'rB'}
  document.getElementById(m[r]).classList.add('on')
}
function cRR(){
  const e=parseFloat(document.getElementById('fE').value)
  const s=parseFloat(document.getElementById('fSL').value)
  const t=parseFloat(document.getElementById('fTP').value)
  if(isNaN(e)||isNaN(s)||isNaN(t))return
  const risk=Math.abs(e-s),rew=Math.abs(t-e),rr=risk>0?rew/risk:0
  document.getElementById('rRisk').textContent=risk.toFixed(2)+' pts'
  document.getElementById('rRew').textContent=rew.toFixed(2)+' pts'
  const el=document.getElementById('rRatio')
  el.textContent='1 : '+rr.toFixed(2)
  el.className='rrval '+(rr>=2?'cg':rr>=1?'cy':'cr')
}
function saveTrade(){
  const sym=document.getElementById('fS').value.trim().toUpperCase()
  const entry=parseFloat(document.getElementById('fE').value)
  const sl=parseFloat(document.getElementById('fSL').value)
  const tp=parseFloat(document.getElementById('fTP').value)
  const date=document.getElementById('fD').value
  const type=document.getElementById('fTy').value
  const rin=document.getElementById('fRI').value.trim()
  const rout=document.getElementById('fRO').value.trim()
  if(!sym||isNaN(entry)||isNaN(sl)||isNaN(tp)||!date){alert('กรอกข้อมูลให้ครบครับ');return}
  if(!res){alert('เลือกผลลัพธ์ด้วยครับ');return}
  const risk=Math.abs(entry-sl),rew=Math.abs(tp-entry),rr=risk>0?rew/risk:0
  const t={id:eid||Date.now(),symbol:sym,dir,type,entry,sl,tp,date,result:res,rin,rout,risk,reward:rew,rr}
  if(eid)trades=trades.map(x=>x.id===eid?t:x)
  else trades.unshift(t)
  sv();closeModal();ra()
}
function delT(id){if(!confirm('ลบรายการนี้?'))return;trades=trades.filter(x=>x.id!==id);sv();ra()}
function sf(f,el){filt=f;document.querySelectorAll('.ftab').forEach(b=>b.classList.remove('on'));el.classList.add('on');ra()}
function ra(){
  const wins=trades.filter(t=>t.result==='win').length,total=trades.length
  const wr=total>0?(wins/total*100).toFixed(1):0
  const avgRR=total>0?(trades.reduce((a,t)=>a+t.rr,0)/total).toFixed(2):'0.00'
  const tR=trades.filter(t=>t.result==='win').reduce((a,t)=>a+t.reward,0)
  const tRk=trades.filter(t=>t.result==='loss').reduce((a,t)=>a+t.risk,0)
  const pf=tRk>0?(tR/tRk).toFixed(2):tR>0?'∞':'0.00'
  document.getElementById('sWR').textContent=wr+'%'
  document.getElementById('sT').textContent=total
  document.getElementById('sRR').textContent=avgRR
  document.getElementById('sPF').textContent=pf
  document.getElementById('eqF').style.width=wr+'%'
  document.getElementById('eqP').textContent=wr+'%'
  let list=trades
  if(filt==='win')list=trades.filter(t=>t.result==='win')
  else if(filt==='loss')list=trades.filter(t=>t.result==='loss')
  else if(filt==='be')list=trades.filter(t=>t.result==='be')
  else if(filt==='buy')list=trades.filter(t=>t.dir==='buy')
  else if(filt==='sell')list=trades.filter(t=>t.dir==='sell')
  document.getElementById('tC').textContent=list.length+' รายการ'
  const el=document.getElementById('tList')
  if(!list.length){el.innerHTML='<div class="empty"><div class="ico">📋</div><p>ไม่มีรายการในหมวดนี้</p></div>';return}
  el.innerHTML=list.map(t=>{
    const rl=t.result==='win'?'✅ WIN':t.result==='loss'?'❌ LOSS':'⚪ BE'
    const rc=t.rr>=2?'cg':t.rr>=1?'cy':'cr'
    return`<div class="card ${t.result}">
      <div class="card-top">
        <div style="display:flex;align-items:center;flex-wrap:wrap;gap:4px">
          <span class="dtag ${t.dir}">${t.dir==='buy'?'▲ BUY':'▼ SELL'}</span>
          <span class="sym">${t.symbol}</span>
          <span class="dt">${t.date} · ${t.type}</span>
        </div>
        <span class="rtag ${t.result}">${rl}</span>
      </div>
      <div class="cgrid">
        <div><div class="fl">Entry</div><div class="fv">${t.entry}</div></div>
        <div><div class="fl">SL</div><div class="fv cr">${t.sl}</div></div>
        <div><div class="fl">TP</div><div class="fv cg">${t.tp}</div></div>
        <div><div class="fl">R:R</div><div class="fv ${rc}">1:${t.rr.toFixed(2)}</div></div>
      </div>
      ${t.rin?`<div class="rsn"><strong>เหตุผลเข้า:</strong> ${t.rin}</div>`:''}
      ${t.rout?`<div class="rsn"><strong>เหตุผลแพ้/ชนะ:</strong> ${t.rout}</div>`:''}
      <div class="cact">
        <button class="bsm" onclick="openModal(${t.id})">✏️ แก้ไข</button>
        <button class="bdel" onclick="delT(${t.id})">🗑️ ลบ</button>
      </div>
    </div>`
  }).join('')
}
ra()
</script>

</body>
</html>
